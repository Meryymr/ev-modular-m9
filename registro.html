<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro - gestor de tareas</title>
    <link rel="stylesheet" href="/assets/css/styles.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light d-flex align-items-center vh-100">
 <body class="bg-light d-flex align-items-center vh-100">

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-lg border-0 rounded-4">
                    <div class="card-body p-5">
                        <h2 class="text-center fw-bold mb-4 text-primary">Crear Cuenta</h2>
                        <p class="text-muted text-center mb-4">Regístrate para comenzar a gestionar tus tareas en equipo</p>
                        
                        <form id="formRegistro" novalidate>
                            <div class="mb-3">
                                <label for="nombre" class="form-label fw-semibold">Nombre Completo</label>
                                <input type="text" class="form-control" id="nombre" placeholder="Pedro Campos" required>
                                <div class="invalid-feedback">Por favor, ingresa tu nombre.</div>
                            </div>

                            <div class="mb-3">
                                <label for="email" class="form-label fw-semibold">Correo Electrónico</label>
                                <input type="email" class="form-control" id="email" placeholder="pedrocampos@gmail.com" required>
                                <div class="invalid-feedback">Ingresa un correo electrónico válido.</div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="password" class="form-label fw-semibold">Contraseña</label>
                                <input type="password" class="form-control" id="password" placeholder="******" required minlength="6">
                                <div class="invalid-feedback">La contraseña debe tener al menos 6 caracteres</div>
                            </div>

                            <div class="mb-4">
                                <label for="rol" class="form-label fw-semibold">Rol del Usuario</label>
                                <select class="form-select" id="rol" required>
                                    <option value="" selected disabled>Selecciona un rol...</option>
                                    <option value="usuario">Usuario General</option>
                                    <option value="administrador">Administrador</option>
                                </select>
                                <div class="invalid-feedback">Por favor, selecciona un rol para tu usuario</div>
                            </div>

                            <button type="submit" class="btn btn-primary btn-lg w-100 rounded-3 mb-3">Registrarse</button>
                        </form>

                        <div class="text-center">
                            <span>¿Ya tienes cuenta?</span>
                            <a href="index.html" class="text-decoration-none fw-bold text-primary"> Inicia sesión aquí</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bundle.min.js"></script>
    <script src="assets/js/validaciones.js"></script>
  </body>
</html>
