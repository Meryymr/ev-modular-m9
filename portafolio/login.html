<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>María Melo | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
      body { background-color: #0c0d30; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; }
      .login-box { background-color: #000000; width: 100%; max-width: 380px; border-radius: 10px; border: 1px solid #334155; }
    </style>
  </head>
  <body>

    <div class="card login-box p-4 shadow-lg text-white">
      <div class="text-center mb-4">
        <h3 class="fw-bold text-primary"></i>Portal de acceso</h3>
        <p class="small">Área de acceso al Gestor de Tareas</p>
      </div>
      
      <!-- El formulario es sólo de ejemplo, redirige incluso sin credenciales al acceso del sistema de gestión de tareas -->

      <form action="../index.html" method="GET">
        <div class="mb-3">
          <label class="form-label text-white-50 small">Email</label>
          <input type="email" class="form-control bg-dark text-white border-secondary" value="maria@gmail.com" readonly />
        </div>
        <div class="mb-3">
          <label class="form-label text-white-50 small">Password</label>
          <input type="password" class="form-control bg-dark text-white border-secondary" value="••••••••" readonly />
        </div>
        <button type="submit" class="btn btn-primary w-100 fw-bold text-white mt-3 py-2">Ingresar a la App Real</button>
      </form>
      
      <div class="text-center mt-3">
        <a href="index.html" class="text-primary small text-decoration-none">← Volver al Portafolio</a>
      </div>
    </div>

  </body>
</html>
