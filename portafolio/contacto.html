<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>María Melo | Contacto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="../assets/css/styles.css" />
  </head>
  <body class="d-flex flex-column min-vh-100">

   <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
      <div class="container">
        <a class="navbar-brand fw-bold text-white" href="index.html"><i class="fa-solid fa-code me-2"></i>MM.dev</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto align-items-center">
            <li class="nav-item"><a class="nav-link active fw-bold" href="index.html">Sobre Mí</a></li>
            <li class="nav-item"><a class="nav-link" href="proyectos.html">Proyecto Fullstack</a></li>
            <li class="nav-item"><a class="nav-link" href="contacto.html">Contacto</a></li>
            <li class="nav-item ms-lg-3"><a class="btn btn-outline-info btn-sm px-3" href="login.html">Acceder</a>
          </ul>
        </div>
      </div>
    </nav>
    <main class="container my-5 py-4">
      <div class="row justify-content-center">
        <div class="col-lg-6">
          <div class="card card-custom p-4 p-md-5 border-0 shadow-sm">
            <h2 class="fw-bold text-center text-dark mb-4">¡Hablemos!</h2>
            <form id="formContacto" novalidate>
    <div class="mb-3">
        <label class="form-label fw-semibold">Nombre Completo</label>
        <input type="text" id="nombre" class="form-control" placeholder="Tu nombre y apellido" required />
        <div class="invalid-feedback" id="errorNombre"></div>
    </div>

    <div class="mb-3">
        <label class="form-label fw-semibold">Email de Contacto</label>
        <input type="text" id="email" class="form-control" placeholder="nombre@correo.com" required />
        <div class="invalid-feedback" id="errorEmail"></div>
    </div>

    <div class="mb-3">
        <label class="form-label fw-semibold">Mensaje</label>
        <textarea class="form-control" rows="4" placeholder="Escribe tu propuesta o consulta técnica..." required></textarea>
    </div>

    <button type="submit" class="btn btn-dark w-100 fw-bold">Enviar Mensaje</button>
</form>
          </div>
        </div>
      </div>
    </main>

    <footer class="text-center py-4 mt-auto">
      <div class="container"><p class="mb-0 small">&copy; 2026 Mery - All rights reserved.</p></div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./contacto.js"></script>
  </body>
</html>
