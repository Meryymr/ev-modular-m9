<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de gestión de tareas</title>
    <link rel="stylesheet" href="/assets/css/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex align-items-center vh-100">
    
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-lg border-0 rounded-4">
                    <div class="card-body p-5">
                        <h2 class="text-center fw-bold mb-4 text-primary">¡Hola nuevamente!</h2>
                        <p class="text-muted text-center mb-4">Ingresa tus credenciales para acceder al gestor de tareas</p>
                        
                        <form id="formLogin">
                            <div class="mb-3">
                                <label for="email" class="form-label fw-semibold">Correo Electrónico</label>
                                <input type="email" class="form-control form-control-lg" id="email" placeholder="nombre@correo.com" required>
                                <div class="invalid-feedback">Ingresa un correo válido.</div>
                            </div>
                            
                            <div class="mb-4">
                                <label for="password" class="form-label fw-semibold">Contraseña</label>
                                <input type="password" class="form-control form-control-lg" id="password" placeholder="••••••••" required>
                                <div class="invalid-feedback">La contraseña no puede estar vacía.</div>
                            </div>

                            <button type="submit" class="btn btn-primary btn-lg w-100 rounded-3 mb-3">Iniciar Sesión</button>
                        </form>

                        <div class="text-center">
                            <span>¿No tienes una cuenta?</span>
                            <a href="registro.html" class="text-decoration-none fw-bold text-primary"> Regístrate aquí</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/validaciones.js"></script>
</body>
</html>
